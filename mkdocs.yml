site_name: Cardano MPFS Browser
site_url: https://lambdasistemi.github.io/cardano-mpfs-browser/
repo_url: https://github.com/lambdasistemi/cardano-mpfs-browser
repo_name: lambdasistemi/cardano-mpfs-browser

theme:
  name: material
  palette:
    - scheme: slate
      primary: indigo
      accent: indigo

nav:
  - Home: index.md
  - Design: design.md

markdown_extensions:
  - pymdownx.highlight
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - tables
  - admonition

extra_javascript:
  - https://unpkg.com/mermaid@11/dist/mermaid.min.js
  - js/mermaid-init.js
