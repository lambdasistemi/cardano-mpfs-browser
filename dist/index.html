<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MPFS Explorer</title>
    <style>
        :root {
            --bg: #f5f2eb;
            --fg: #1f2933;
            --muted: #65717c;
            --surface: #fffdf8;
            --surface-2: #ece7dd;
            --border: #cfc7ba;
            --accent: #0f766e;
            --accent-2: #8f3d5f;
            --disabled: #8a8f95;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--fg);
            line-height: 1.5;
        }
        button { font: inherit; }
        #app { min-height: 100vh; }
        .app-shell {
            width: min(1120px, calc(100vw - 32px));
            margin: 0 auto;
            padding: 28px 0;
        }
        .shell-header {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            gap: 24px;
            padding-bottom: 18px;
            border-bottom: 1px solid var(--border);
        }
        .eyebrow {
            color: var(--accent-2);
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 0;
            text-transform: uppercase;
        }
        h1 {
            color: var(--fg);
            font-size: clamp(1.8rem, 3vw, 2.7rem);
            line-height: 1.1;
            margin-top: 4px;
        }
        .status-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: flex-end;
            gap: 8px;
        }
        .status-pill {
            min-width: 132px;
            border: 1px solid var(--border);
            background: var(--surface);
            padding: 8px 10px;
            border-radius: 6px;
        }
        .status-pill span,
        .field-line span {
            display: block;
            color: var(--muted);
            font-size: 0.76rem;
            font-weight: 700;
            letter-spacing: 0;
            text-transform: uppercase;
        }
        .status-pill strong,
        .field-line strong {
            display: block;
            color: var(--fg);
            font-size: 0.95rem;
            overflow-wrap: anywhere;
        }
        .tab-strip {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 8px;
            margin: 18px 0;
        }
        .tab-button {
            min-height: 44px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--surface);
            color: var(--fg);
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-weight: 700;
        }
        .tab-button:hover {
            border-color: var(--accent);
        }
        .tab-button.is-active {
            background: #e0f2ef;
            border-color: var(--accent);
            color: #063f3b;
        }
        .tab-marker {
            width: 8px;
            height: 8px;
            border-radius: 999px;
            background: var(--surface-2);
            border: 1px solid var(--border);
        }
        .tab-button.is-active .tab-marker {
            background: var(--accent);
            border-color: var(--accent);
        }
        .panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            min-height: 360px;
            padding: 22px;
        }
        .panel-layout {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 14px;
        }
        .panel-heading {
            grid-column: 1 / -1;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }
        .panel-heading h2 {
            font-size: 1.35rem;
            line-height: 1.2;
        }
        .panel-heading p {
            color: var(--muted);
            margin-top: 4px;
        }
        .field-line {
            border: 1px solid var(--border);
            border-radius: 6px;
            background: #faf8f2;
            min-height: 74px;
            padding: 12px;
        }
        .control-row {
            grid-column: 1 / -1;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            padding-top: 8px;
        }
        .inert-button {
            min-height: 40px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--surface-2);
            color: var(--disabled);
            padding: 0 14px;
            cursor: not-allowed;
        }
        @media (max-width: 720px) {
            .app-shell {
                width: min(100vw - 20px, 1120px);
                padding: 16px 0;
            }
            .shell-header {
                align-items: stretch;
                flex-direction: column;
            }
            .status-row {
                justify-content: flex-start;
            }
            .status-pill {
                flex: 1 1 148px;
            }
            .tab-strip,
            .panel-layout {
                grid-template-columns: 1fr;
            }
            .panel {
                padding: 16px;
            }
        }
    </style>
</head>
<body>
    <div id="app"></div>
    <script src="config.js"></script>
    <script src="index.js"></script>
</body>
</html>
